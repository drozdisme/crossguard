[tool.crossguard]
# L1 contract path (Solidity)
# Supports: .sol (source), .json (AST)
l1_contract = "contracts/Bridge.sol"

# L2 contract path (Cairo)
# Supports: .cairo (source), .json/.sierra (compiled)
l2_contract = "src/bridge.cairo"

# Output format: terminal, json, sarif, html
output_format = "terminal"

# Output file (optional, defaults to stdout)
output_file = ""

# Color output
color = true

# Exit with error code if findings meet severity threshold
# Options: CRITICAL, HIGH, MEDIUM, LOW, NONE
fail_on = "HIGH"
